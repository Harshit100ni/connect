<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox — Voice Call</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient"></div>

<div class="app">
  <div class="logo">Vox</div>
  <div class="tagline">Peer-to-peer voice, nothing in between</div>

  <div class="card">

    <!-- SETUP VIEW -->
    <div id="setupView">
      <div class="section-title">Your Name</div>
      <div class="input-group input-group--sm">
        <input type="text" id="userName" placeholder="Enter your name" maxlength="20">
      </div>
      <button class="btn btn-accent btn-full" id="startCallBtn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 3-2.5 2.5c1 2 2.5 3.5 4.5 4.5L15.5 11l3 2v4a1 1 0 01-1 1A16 16 0 013 3.5a1 1 0 011-1z" transform="scale(0.8)"/></svg>
        Start Call
      </button>
    </div>

    <!-- WAITING VIEW (caller waiting for receiver to open link) -->
    <div id="waitingView" class="hidden">
      <button class="btn-cancel" id="cancelWaitBtn">← Cancel</button>
      <div class="status-area">
        <div class="status-badge">
          <span class="status-dot waiting"></span>
          <span>Waiting for other person to join…</span>
        </div>
      </div>
      <div class="section-title">Share this link</div>
      <div class="signal-box">
        <textarea id="shareUrl" readonly rows="2"></textarea>
        <div class="signal-actions">
          <button class="btn btn-accent" id="copyLinkBtn">Copy Link</button>
        </div>
      </div>
    </div>

    <!-- JOINING VIEW (receiver auto-joining from URL) -->
    <div id="joiningView" class="hidden">
      <div class="joining-status">
        <div class="status-badge">
          <span class="status-dot waiting"></span>
          <span>Joining call…</span>
        </div>
      </div>
    </div>

    <!-- CALL VIEW -->
    <div id="callView" class="call-view">
      <div class="avatars">
        <div class="avatar local" id="localAvatar">
          <div class="ring"></div>
          <span id="localInitial">Y</span>
        </div>
        <div class="connect-icon">⇄</div>
        <div class="avatar remote" id="remoteAvatar">
          <div class="ring"></div>
          <span id="remoteInitial">?</span>
        </div>
      </div>
      <div class="call-timer" id="callTimer">00:00</div>
      <div class="call-label">Call in progress</div>
      <div class="quality-indicator" id="qualityIndicator"></div>
      <button class="btn btn-ghost hidden" id="autoplayBtn">▶ Tap to hear audio</button>

      <div class="call-controls">
        <button class="ctrl-btn mute-btn" id="muteBtn" title="Mute/Unmute">
          <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <svg id="micOffIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
            <path d="M17 16.95A7 7 0 015 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <button class="ctrl-btn end-btn" id="endBtn" title="End Call">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.63A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91"/>
            <line x1="23" y1="1" x2="1" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
